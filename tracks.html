    <script src="tracks.js"></script>

    <div
      id="modal-overlay"
      onclick="closeModal()"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 100;
      "
    ></div>

    <div
      id="modal"
      style="
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #111;
        border: 1px solid red;
        border-radius: 12px;
        padding: 28px;
        z-index: 101;
        max-width: 480px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
      "
    >
      <div id="modal-content"></div>
      <button
        onclick="closeModal()"
        style="
          margin-top: 15px;
          background: #222;
          color: red;
          border: 1px solid red;
          padding: 6px 14px;
          border-radius: 6px;
          cursor: pointer;
        "
      >
        ✖ Kapat
      </button>
    </div>
